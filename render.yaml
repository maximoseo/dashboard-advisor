services:
  - type: web
    name: dashboard-advisor
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "3000"
      # --- Secrets (set these in the Render dashboard) ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      # --- Optional overrides (sensible defaults live in lib/config.js) ---
      - key: SUPABASE_TABLE
        value: dashboard_suggestions
      # Paperclip runs on a private host; only set these if Render can reach it.
      - key: PAPERCLIP_URL
        sync: false
      - key: PAPERCLIP_API_KEY
        sync: false
